<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="24" fill="url(#bg)"/>
  <rect x="8" y="8" width="104" height="104" rx="20" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <!-- Chart bars -->
  <rect x="18" y="72" width="12" height="24" rx="3" fill="#60a5fa" opacity="0.5"/>
  <rect x="34" y="58" width="12" height="38" rx="3" fill="#60a5fa" opacity="0.65"/>
  <rect x="50" y="44" width="12" height="52" rx="3" fill="#60a5fa" opacity="0.8"/>
  <!-- Trend line -->
  <polyline points="24,78 40,64 56,48 72,38 88,30 100,26" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="100" cy="26" r="3" fill="#4ade80"/>
  <!-- SEO text -->
  <text x="60" y="112" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="800" letter-spacing="4" fill="#93c5fd">SEO</text>
</svg>
