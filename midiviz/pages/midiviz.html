<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MidiViz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        #viz-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        /* Mic permission prompt overlay - shown until user grants access */
        #mic-prompt {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            gap: 20px;
        }
        #mic-prompt h2 { font-size: 22px; font-weight: 600; color: #fff; }
        #mic-prompt p { font-size: 14px; color: #999; max-width: 400px; text-align: center; line-height: 1.5; }
        #mic-btn {
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            min-height: 44px;
        }
        #mic-btn:active { background: #2563eb; }
        #mic-icon {
            width: 64px; height: 64px;
            border-radius: 50%;
            background: rgba(59,130,246,0.15);
            display: flex; align-items: center; justify-content: center;
            font-size: 32px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Prompt user to grant mic before loading midiviz -->
    <div id="mic-prompt">
        <div id="mic-icon">&#127908;</div>
        <h2>Microphone Access Required</h2>
        <p>MidiViz is audio-reactive and needs microphone access to visualize sound. Tap below to grant permission, then the visualizer will load.</p>
        <button id="mic-btn" onclick="requestMic()">Enable Microphone</button>
        <p id="mic-error" style="color: #ef4444; display: none;"></p>
    </div>

    <iframe
        id="viz-frame"
        class="hidden"
        src="about:blank"
        allow="microphone; autoplay; fullscreen"
        referrerpolicy="no-referrer-when-downgrade"
    ></iframe>

    <script>
        async function requestMic() {
            const btn = document.getElementById('mic-btn');
            const errEl = document.getElementById('mic-error');
            btn.textContent = 'Requesting...';
            errEl.style.display = 'none';

            try {
                // Request mic permission at THIS origin level first
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                // Got permission - stop the stream (midiviz will request its own)
                stream.getTracks().forEach(t => t.stop());

                // Hide prompt, show visualizer
                document.getElementById('mic-prompt').classList.add('hidden');
                const frame = document.getElementById('viz-frame');
                frame.classList.remove('hidden');
                frame.src = 'https://midiviz.com/';
            } catch (err) {
                console.error('Mic access denied:', err);
                errEl.textContent = err.name === 'NotAllowedError'
                    ? 'Microphone was denied. Check your browser/PWA permissions and try again.'
                    : 'Could not access microphone: ' + err.message;
                errEl.style.display = 'block';
                btn.textContent = 'Try Again';
            }
        }

        // If mic is already granted, skip the prompt
        if (navigator.permissions && navigator.permissions.query) {
            navigator.permissions.query({ name: 'microphone' }).then(result => {
                if (result.state === 'granted') {
                    document.getElementById('mic-prompt').classList.add('hidden');
                    const frame = document.getElementById('viz-frame');
                    frame.classList.remove('hidden');
                    frame.src = 'https://midiviz.com/';
                }
            }).catch(() => { /* permissions API not supported, show prompt */ });
        }
    </script>
</body>
</html>
