<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookmarks Intelligence</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { background: #07080c; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }

  /* Card hover */
  .bm-card { background: #0f1117; border: 1px solid #1a1d2a; border-radius: 10px; cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s; }
  .bm-card:hover { border-color: #2563eb; box-shadow: 0 0 0 1px #2563eb22; }

  /* Tag pills */
  .tag { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; white-space: nowrap; }
  .tag-default { background: #141620; color: #94a3b8; border-color: #1e2030; }
  .tag-default:hover { border-color: #3b82f6; color: #cbd5e1; }
  .tag-active { background: #1e3a5f; color: #60a5fa; border-color: #2563eb; }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* Schedule modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 60; display: none; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-sheet { background: #0f1117; border-top: 1px solid #1a1d2a; border-radius: 16px 16px 0 0; width: 100%; max-width: 480px; padding: 24px; animation: slideUp 0.25s ease; }
  @media (min-width: 640px) { .modal-overlay.open { align-items: center; } .modal-sheet { border-radius: 12px; border: 1px solid #1a1d2a; } }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  /* Status indicators */
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .status-done { background: #22c55e; }
  .status-pending { background: #64748b; }
  .status-running { background: #eab308; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Priority badges */
  .pri-high { background: #1a0a0a; color: #f87171; border: 1px solid #7f1d1d; }
  .pri-medium { background: #1a1a0a; color: #fbbf24; border: 1px solid #713f12; }
  .pri-low { background: #0a1a0a; color: #4ade80; border: 1px solid #166534; }

  /* Risk colors for tags */
  .tag-ai { background: #0f172a; color: #60a5fa; border-color: #1e3a5f; }
  .tag-dev-tools { background: #0f170a; color: #a3e635; border-color: #365314; }
  .tag-browser { background: #170f0a; color: #fb923c; border-color: #7c2d12; }
  .tag-seo { background: #0a1717; color: #2dd4bf; border-color: #134e4a; }
  .tag-security { background: #170a0a; color: #f87171; border-color: #7f1d1d; }
  .tag-infrastructure { background: #0f0a17; color: #a78bfa; border-color: #4c1d95; }
  .tag-design { background: #170a14; color: #f472b6; border-color: #831843; }
  .tag-open-source { background: #0a170f; color: #34d399; border-color: #065f46; }
  .tag-data { background: #0a0f17; color: #38bdf8; border-color: #0c4a6e; }
  .tag-business { background: #17170a; color: #facc15; border-color: #713f12; }
  .tag-video { background: #170a10; color: #e879f9; border-color: #701a75; }
  .tag-voice { background: #0a1417; color: #67e8f9; border-color: #155e75; }

  /* Input */
  .search-input { background: #0f1117; border: 1px solid #1a1d2a; border-radius: 8px; color: #e2e8f0; padding: 10px 12px 10px 38px; font-size: 14px; width: 100%; outline: none; transition: border-color 0.2s; }
  .search-input:focus { border-color: #3b82f6; }
  .search-input::placeholder { color: #4a5568; }

  /* Select */
  .sel { background: #0f1117; border: 1px solid #1a1d2a; border-radius: 8px; color: #94a3b8; padding: 8px 10px; font-size: 13px; outline: none; cursor: pointer; }
  .sel:focus { border-color: #3b82f6; }

  /* Toggle */
  .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track { position: absolute; cursor: pointer; inset: 0; background: #1a1d2a; border-radius: 12px; transition: background 0.2s; }
  .toggle-track:before { content: ''; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #64748b; border-radius: 50%; transition: all 0.2s; }
  .toggle input:checked + .toggle-track { background: #1d4ed8; }
  .toggle input:checked + .toggle-track:before { transform: translateX(20px); background: #3b82f6; }

  /* Skeleton loading */
  .skel { background: linear-gradient(90deg, #141620 25%, #1a1d2a 50%, #141620 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* Engagement stats */
  .stat { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #64748b; }

  /* Research buttons */
  .res-btn { padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; white-space: nowrap; min-height: 28px; }
  .res-btn-go { background: #1e3a5f; color: #60a5fa; }
  .res-btn-go:hover { background: #1d4ed8; color: #fff; }
  .res-btn-done { background: #0a2e1a; color: #4ade80; border: 1px solid #166534; }
  .res-btn-done:hover { background: #166534; color: #fff; }
  .res-btn-running { background: #1a1a0a; color: #eab308; border: 1px solid #713f12; animation: pulse 1.5s infinite; }

  /* Detail page (replaces slide panel) */
  .detail-page { display: none; }
  .detail-page.open { display: block; }
  .list-view { display: block; }
  .list-view.hidden { display: none; }

  /* Research section cards */
  .research-section { background: #141620; border: 1px solid #1a1d2a; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
  .research-label { font-size: 11px; color: #4a5568; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .research-text { font-size: 14px; color: #e2e8f0; line-height: 1.6; }
  .linked-card { background: #0f1117; border: 1px solid #1a1d2a; border-radius: 8px; padding: 14px; margin-bottom: 8px; }
  .readme-block { background: #0a0b10; border: 1px solid #1a1d2a; border-radius: 8px; padding: 14px; font-size: 13px; color: #94a3b8; line-height: 1.6; max-height: 400px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
</style>
</head>
<body>

<!-- ─── Top Bar ─────────────────────────────────────────────── -->
<header style="position: sticky; top: 0; z-index: 30; background: #07080cee; backdrop-filter: blur(12px); border-bottom: 1px solid #1a1d2a;">
  <div style="max-width: 1200px; margin: 0 auto; padding: 12px 16px;">
    <!-- Row 1: Title + actions -->
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" style="flex-shrink:0"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
      <h1 style="font-size: 16px; font-weight: 700; margin: 0; flex: 1;">Bookmarks Intelligence</h1>
      <button onclick="syncNow()" id="sync-btn" title="Sync now" style="background: none; border: 1px solid #1a1d2a; border-radius: 8px; padding: 7px 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; color: #94a3b8; font-size: 12px; transition: all 0.15s;" onmouseover="this.style.borderColor='#3b82f6';this.style.color='#e2e8f0'" onmouseout="this.style.borderColor='#1a1d2a';this.style.color='#94a3b8'">
        <svg id="sync-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
        <span id="sync-label">Sync</span>
      </button>
      <button onclick="openSchedule()" title="Schedule" style="background: none; border: 1px solid #1a1d2a; border-radius: 8px; padding: 7px; cursor: pointer; color: #94a3b8; transition: all 0.15s;" onmouseover="this.style.borderColor='#3b82f6';this.style.color='#e2e8f0'" onmouseout="this.style.borderColor='#1a1d2a';this.style.color='#94a3b8'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>
    <!-- Row 2: Search -->
    <div style="position: relative; margin-bottom: 10px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="2" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%);"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" class="search-input" placeholder="Search bookmarks..." oninput="debouncedSearch()">
    </div>
    <!-- Row 3: Filters + stats -->
    <div style="display: flex; align-items: center; gap: 8px; overflow-x: auto; padding-bottom: 2px; -webkit-overflow-scrolling: touch;">
      <select id="status-filter" class="sel" onchange="loadLibrary()" style="min-width: 90px;">
        <option value="all">All</option>
        <option value="researched">Researched</option>
        <option value="pending">Pending</option>
      </select>
      <select id="sort-filter" class="sel" onchange="loadLibrary()" style="min-width: 90px;">
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
        <option value="popular">Popular</option>
      </select>
      <div style="margin-left: auto; font-size: 12px; color: #4a5568; white-space: nowrap;" id="stats-line">--</div>
    </div>
  </div>
  <!-- Tag filter bar -->
  <div id="tag-bar" class="list-view" style="max-width: 1200px; margin: 0 auto; padding: 0 16px 10px; display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch;"></div>
  <!-- Detail page back bar -->
  <div id="detail-back-bar" style="display:none; max-width: 800px; margin: 0 auto; padding: 6px 16px 10px;">
    <button onclick="closeDetail()" style="display: flex; align-items: center; gap: 6px; background: none; border: 1px solid #1a1d2a; border-radius: 8px; padding: 8px 14px; color: #94a3b8; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s;" onmouseover="this.style.borderColor='#3b82f6';this.style.color='#e2e8f0'" onmouseout="this.style.borderColor='#1a1d2a';this.style.color='#94a3b8'">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
      Back to Bookmarks
    </button>
  </div>
</header>

<!-- ─── Main Content ────────────────────────────────────────── -->
<main id="main" class="list-view" style="max-width: 1200px; margin: 0 auto; padding: 12px 16px 80px;">
  <!-- Loading skeletons -->
  <div id="skeleton" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px;">
    <div class="skel" style="height: 120px;"></div>
    <div class="skel" style="height: 120px;"></div>
    <div class="skel" style="height: 120px;"></div>
  </div>
  <!-- Empty state -->
  <div id="empty-state" style="display: none; text-align: center; padding: 60px 20px;">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#1e293b" stroke-width="1.5" style="margin: 0 auto 16px;"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
    <p style="color: #4a5568; font-size: 14px; margin: 0 0 16px;" id="empty-text">No bookmarks yet. Hit Sync to pull your X bookmarks.</p>
    <button onclick="syncNow()" style="background: #1d4ed8; color: white; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer;">Sync Bookmarks</button>
  </div>
  <!-- Bookmark grid -->
  <div id="grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px;"></div>
  <!-- Load more -->
  <div id="load-more-wrap" style="display: none; text-align: center; padding: 20px;">
    <button onclick="loadMore()" style="background: #141620; border: 1px solid #1a1d2a; border-radius: 8px; padding: 10px 24px; color: #94a3b8; font-size: 13px; cursor: pointer; transition: all 0.15s;" onmouseover="this.style.borderColor='#3b82f6'" onmouseout="this.style.borderColor='#1a1d2a'" id="load-more-btn">Load More</button>
  </div>
</main>

<!-- ─── Detail Page (in-page, replaces list) ────────────────── -->
<div class="detail-page" id="detail-page" style="max-width: 800px; margin: 0 auto; padding: 12px 16px 80px;">
  <div id="detail-content"></div>
</div>

<!-- ─── Schedule Modal ──────────────────────────────────────── -->
<div class="modal-overlay" id="schedule-modal">
  <div class="modal-sheet">
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <h2 style="font-size: 16px; font-weight: 700; margin: 0; flex: 1;">Sync Schedule</h2>
      <button onclick="closeSchedule()" style="background: none; border: none; cursor: pointer; color: #64748b; padding: 4px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    <!-- Enable toggle -->
    <div style="display: flex; align-items: center; gap: 12px; padding: 14px; background: #141620; border-radius: 10px; margin-bottom: 14px;">
      <label class="toggle">
        <input type="checkbox" id="sched-enabled" onchange="saveSchedule()">
        <span class="toggle-track"></span>
      </label>
      <div>
        <div style="font-size: 14px; font-weight: 600;">Auto-Sync</div>
        <div style="font-size: 12px; color: #64748b;">Automatically check for new bookmarks</div>
      </div>
    </div>
    <!-- Interval -->
    <div style="margin-bottom: 14px;">
      <label style="font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px;">Check every</label>
      <select id="sched-interval" class="sel" style="width: 100%;" onchange="saveSchedule()">
        <option value="15">15 minutes</option>
        <option value="30">30 minutes</option>
        <option value="60" selected>1 hour</option>
        <option value="240">4 hours</option>
        <option value="720">12 hours</option>
        <option value="1440">Daily</option>
      </select>
    </div>
    <!-- Last sync info -->
    <div style="font-size: 12px; color: #4a5568; padding-top: 8px; border-top: 1px solid #1a1d2a;">
      <div>Last sync: <span id="sched-last" style="color: #94a3b8;">Never</span></div>
      <div style="margin-top: 4px;">Status: <span id="sched-status" style="color: #94a3b8;">--</span></div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let allBookmarks = [];
let allTags = [];
let activeTag = null;
let currentOffset = 0;
let totalCount = 0;
const PAGE_SIZE = 30;
let searchTimeout = null;
let selectedBookmarkId = null;

// ── Init ──
async function init() {
  await Promise.all([loadLibrary(), loadTags(), loadScheduleState()]);
}

// ── Load library ──
async function loadLibrary() {
  const q = document.getElementById('search-input').value.trim();
  const status = document.getElementById('status-filter').value;
  const sort = document.getElementById('sort-filter').value;

  currentOffset = 0;

  const params = new URLSearchParams({ limit: PAGE_SIZE, offset: 0, status, sort });
  if (q) params.set('q', q);
  if (activeTag) params.set('tag', activeTag);

  try {
    const resp = await fetch(`${API}/api/twitter/library?${params}`);
    const data = await resp.json();

    allBookmarks = data.bookmarks || [];
    totalCount = data.total || 0;

    document.getElementById('skeleton').style.display = 'none';
    document.getElementById('stats-line').textContent = `${totalCount} bookmark${totalCount !== 1 ? 's' : ''}${data.last_sync ? ' \u00b7 synced ' + timeAgo(data.last_sync) : ''}`;

    if (totalCount === 0) {
      document.getElementById('grid').innerHTML = '';
      document.getElementById('empty-state').style.display = 'block';
      document.getElementById('empty-text').textContent = q || activeTag ? 'No bookmarks match your search.' : 'No bookmarks yet. Hit Sync to pull your X bookmarks.';
      document.getElementById('load-more-wrap').style.display = 'none';
    } else {
      document.getElementById('empty-state').style.display = 'none';
      renderGrid(allBookmarks, false);
      document.getElementById('load-more-wrap').style.display = allBookmarks.length < totalCount ? 'block' : 'none';
    }
  } catch (e) {
    document.getElementById('skeleton').style.display = 'none';
    document.getElementById('grid').innerHTML = `<div style="color:#f87171;padding:20px;text-align:center;">Failed to load: ${e.message}</div>`;
  }
}

// ── Load more ──
async function loadMore() {
  currentOffset += PAGE_SIZE;
  const q = document.getElementById('search-input').value.trim();
  const status = document.getElementById('status-filter').value;
  const sort = document.getElementById('sort-filter').value;

  const params = new URLSearchParams({ limit: PAGE_SIZE, offset: currentOffset, status, sort });
  if (q) params.set('q', q);
  if (activeTag) params.set('tag', activeTag);

  const btn = document.getElementById('load-more-btn');
  btn.textContent = 'Loading...';

  try {
    const resp = await fetch(`${API}/api/twitter/library?${params}`);
    const data = await resp.json();
    const newBms = data.bookmarks || [];
    allBookmarks = allBookmarks.concat(newBms);
    renderGrid(newBms, true);
    document.getElementById('load-more-wrap').style.display = allBookmarks.length < totalCount ? 'block' : 'none';
  } catch (e) { /* ignore */ }
  btn.textContent = 'Load More';
}

// ── Render grid ──
function renderGrid(bookmarks, append) {
  const grid = document.getElementById('grid');
  if (!append) grid.innerHTML = '';

  for (const bm of bookmarks) {
    // Skip non-English bookmarks in default view
    if (bm.lang === 'cjk') continue;

    const card = document.createElement('div');
    card.className = 'bm-card';
    card.onclick = () => openDetail(bm.id);

    const tags = (bm.tags || []).concat(bm.user_tags || []);
    const tagHtml = tags.slice(0, 5).map(t =>
      `<span class="tag tag-${t}" style="font-size:10px;padding:2px 7px;">${t}</span>`
    ).join('');

    const statusClass = bm.research_status === 'done' ? 'status-done' : 'status-pending';
    const priHtml = bm.research_priority ? `<span class="tag pri-${bm.research_priority}" style="font-size:10px;padding:2px 7px;">${bm.research_priority}</span>` : '';

    const rawText = (bm.text || '').trim();
    const truncated = rawText.length > 280 ? rawText.slice(0, 280) + '...' : rawText;
    const hasLinks = (bm.links || []).length > 0;
    const isNonEnglish = bm.lang === 'cjk';

    // Title: use stored title, or generate client-side
    const title = bm.title || getTitle(text);

    const researchBtnId = `res-btn-${bm.id}`;
    const researchBtnHtml = bm.research_status === 'done'
      ? `<button class="res-btn res-btn-done" onclick="event.stopPropagation();openDetail('${bm.id}')">View Research</button>`
      : bm.research_status === 'researching'
      ? `<button class="res-btn res-btn-running" disabled>Researching...</button>`
      : `<button id="${researchBtnId}" class="res-btn res-btn-go" onclick="event.stopPropagation();triggerResearch('${bm.id}','${researchBtnId}')">Research</button>`;

    card.innerHTML = `
      <div style="padding: 16px 18px;">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 4px;">
          <div class="status-dot ${statusClass}" title="${bm.research_status === 'done' ? 'Researched' : 'Pending'}"></div>
          <span style="font-size: 15px; font-weight: 700; color: #e2e8f0; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${escHtml(title)}</span>
          ${isNonEnglish ? '<span style="font-size:10px;padding:2px 7px;background:#1a1a0a;color:#fbbf24;border:1px solid #713f12;border-radius:12px;">non-EN</span>' : ''}
          <span style="font-size: 11px; color: #334155; flex-shrink: 0;">${timeAgo(bm.posted_at || bm.synced_at)}</span>
        </div>
        <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 8px;">
          <span style="font-size: 12px; font-weight: 600; color: #3b82f6;">@${bm.author || 'unknown'}</span>
          <span style="font-size: 11px; color: #4a5568;">${bm.author_name || ''}</span>
        </div>
        <p style="margin: 0 0 10px; font-size: 13px; color: #94a3b8; line-height: 1.5;">${linkify(truncated, bm.links)}</p>
        <div style="display: flex; align-items: center; gap: 6px; flex-wrap: wrap;">
          ${tagHtml}${priHtml}
          <div style="margin-left: auto; display: flex; align-items: center; gap: 8px;">
            ${researchBtnHtml}
            <span class="stat"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>${fmtNum(bm.likes)}</span>
            <span class="stat"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>${fmtNum(bm.views)}</span>
          </div>
        </div>
      </div>`;
    grid.appendChild(card);
  }
}

// ── Load tags ──
async function loadTags() {
  try {
    const resp = await fetch(`${API}/api/twitter/tags`);
    allTags = await resp.json();
    renderTags();
  } catch (e) { /* ignore */ }
}

function renderTags() {
  const bar = document.getElementById('tag-bar');
  if (!allTags.length) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';

  bar.innerHTML = `<span class="tag ${!activeTag ? 'tag-active' : 'tag-default'}" onclick="filterTag(null)">All</span>` +
    allTags.map(t => `<span class="tag ${activeTag === t.tag ? 'tag-active' : 'tag-default'} tag-${t.tag}" onclick="filterTag('${t.tag}')">${t.tag} (${t.count})</span>`).join('');
}

function filterTag(tag) {
  activeTag = tag === activeTag ? null : tag;
  renderTags();
  loadLibrary();
}

// ── Trigger research ──
async function triggerResearch(id, btnId) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  const origHtml = btn.innerHTML;
  btn.disabled = true;
  btn.className = 'res-btn res-btn-running';
  btn.innerHTML = '<span style="display:flex;align-items:center;gap:6px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>Researching...</span>';

  try {
    const resp = await fetch(`${API}/api/twitter/library/${id}/trigger-research`, { method: 'POST' });
    const data = await resp.json();

    if (data.ok) {
      btn.className = 'res-btn res-btn-done';
      btn.innerHTML = 'Done';
      btn.disabled = false;
      // If we're on the detail page for this bookmark, refresh it
      if (selectedBookmarkId === id) {
        const rc = document.getElementById('research-container');
        if (rc && data.research) {
          rc.innerHTML = buildResearchHtml(data.research, {id});
        }
      }
      // Refresh the grid too
      loadLibrary();
    } else {
      btn.className = 'res-btn res-btn-go';
      btn.innerHTML = origHtml;
      btn.disabled = false;
      alert('Research failed: ' + (data.error || 'Unknown error'));
    }
  } catch (e) {
    btn.className = 'res-btn res-btn-go';
    btn.innerHTML = origHtml;
    btn.disabled = false;
    alert('Research error: ' + e.message);
  }
}

// ── Sync ──
async function syncNow() {
  const btn = document.getElementById('sync-btn');
  const icon = document.getElementById('sync-icon');
  const label = document.getElementById('sync-label');
  btn.disabled = true;
  label.textContent = 'Syncing...';
  icon.style.animation = 'spin 1s linear infinite';

  const style = document.createElement('style');
  style.textContent = '@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }';
  document.head.appendChild(style);

  try {
    const resp = await fetch(`${API}/api/twitter/library/sync`, { method: 'POST' });
    const data = await resp.json();
    if (data.ok) {
      label.textContent = `+${data.new_bookmarks}`;
      setTimeout(() => { label.textContent = 'Sync'; }, 2000);
      await Promise.all([loadLibrary(), loadTags()]);
    } else {
      label.textContent = 'Error';
      setTimeout(() => { label.textContent = 'Sync'; }, 2000);
    }
  } catch (e) {
    label.textContent = 'Error';
    setTimeout(() => { label.textContent = 'Sync'; }, 2000);
  } finally {
    btn.disabled = false;
    icon.style.animation = '';
    style.remove();
  }
}

// ── Helpers ──
function getTitle(text) {
  let clean = text.replace(/https?:\/\/\S+/g, '').replace(/@\w+/g, '').replace(/\*\*([^*]+)\*\*/g, '$1');
  clean = clean.replace(/[^\w\s\-/.$#]/g, ' ').replace(/\s+/g, ' ').trim();
  if (!clean) return 'Shared Link';
  // Check known compound names
  const lower = clean.toLowerCase();
  const known = ['claude code','mcp server','seo pages','ai agent','domain authority','open source','x bookmarks'];
  for (const n of known) { if (lower.includes(n)) return n.split(' ').map(w=>w[0].toUpperCase()+w.slice(1)).join(' '); }
  const skip = new Set(['the','a','an','this','that','just','i','my','we','so','if','is','its',"it's","here's",'here','how','what','you','your','get','breaking','someone','built','huge','sharing','friendly','reminder','free','new','and','but','for','with','to','of','in','on','at','by','or','not','are','was','were','been','be','have','has','had','do','does','did','will','top','best','now','today','ever','every','why']);
  const out = [];
  for (const w of clean.split(/\s+/)) {
    const wc = w.replace(/[^\w\-/.$#]/g, '');
    if (!wc || skip.has(wc.toLowerCase())) continue;
    out.push(wc);
    if (out.length >= 3) break;
  }
  if (out.length) return out.join(' ').slice(0, 40);
  const fb = clean.split(/\s+/).filter(w => w.replace(/[^\w]/g, '')).slice(0, 3);
  return fb.join(' ').slice(0, 40);
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function linkify(text, links) {
  // First escape HTML
  let html = escHtml(text);
  // Map t.co URLs to expanded links by position
  const tcoUrls = text.match(/https?:\/\/t\.co\/\w+/g) || [];
  const expandedMap = {};
  if (links && links.length) {
    tcoUrls.forEach((tco, i) => {
      if (links[i]) expandedMap[escHtml(tco)] = links[i];
    });
  }
  // Replace t.co links: show expanded URL if available, otherwise strip them (dead weight)
  for (const tco of tcoUrls.map(u => escHtml(u))) {
    if (expandedMap[tco]) {
      const expanded = expandedMap[tco];
      const display = expanded.replace(/^https?:\/\/(www\.)?/, '').slice(0, 60);
      html = html.replace(tco, `<a href="${escAttr(expanded)}" target="_blank" rel="noopener" style="color:#3b82f6;text-decoration:none;word-break:break-all;" onclick="event.stopPropagation()">${escHtml(display)}</a>`);
    } else {
      // No expanded URL — strip the useless t.co link
      html = html.replace(tco, '');
    }
  }
  // Linkify any remaining non-t.co URLs
  html = html.replace(/https?:\/\/(?!t\.co)[^\s<]+/g, (url) => {
    const display = url.replace(/^https?:\/\/(www\.)?/, '').slice(0, 60);
    return `<a href="${escAttr(url)}" target="_blank" rel="noopener" style="color:#3b82f6;text-decoration:none;word-break:break-all;" onclick="event.stopPropagation()">${display}</a>`;
  });
  return html;
}
function escAttr(s) { return s.replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

function fmtNum(n) {
  n = parseInt(n) || 0;
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  let d;
  if (dateStr.includes('+0000')) {
    d = new Date(dateStr);
  } else {
    d = new Date(dateStr);
  }
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
  return d.toLocaleDateString();
}
